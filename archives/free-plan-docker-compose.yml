services:
  windows:
    image: dockurr/windows
    container_name: windows
    environment:
      VERSION: "11e"
      DISK_SIZE: "32G"      # realistic size for current disk
      CPU_CORES: "2"
      RAM_SIZE: "8G"       # realistic for Cloud Shell
      REGION: "en-US"
      KEYBOARD: "en-US"
      KVM: "NO"
    devices:
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3389:3389/tcp
      - 3389:3389/udp
    volumes:
      - /root/windows:/storage   # make sure this path is on your 95G overlay disk
    restart: always
    stop_grace_period: 2m
